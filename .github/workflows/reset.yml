name: Cat Heist — Reset (TESTING ONLY)

on:
  issues:
    types: [opened]

concurrency:
  group: maze-move
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest

    if: startsWith(github.event.issue.title, '[RESET]')

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run reset
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          ISSUE_AUTHOR:      ${{ github.event.issue.user.login }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
        run: python3 scripts/update_maze.py

      - name: Commit reset state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md game_state.json
          git diff --cached --quiet || git commit -m "🔄 reset by @${{ github.event.issue.user.login }} [skip ci]"
          git push