name: Cat Heist — Move

on:
  issues:
    types: [opened]

# Only one move processes at a time — prevents race conditions if two
# issues open within milliseconds of each other
concurrency:
  group: maze-move
  cancel-in-progress: false

jobs:
  move:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # commit README + game_state.json
      issues: write        # post comments + close issues

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit triggers other workflows if needed.
          # Falls back to GITHUB_TOKEN if PAT not set — fine for most cases.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run move engine
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          ISSUE_AUTHOR:      ${{ github.event.issue.user.login }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
        run: python3 scripts/update_maze.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md game_state.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "🐾 move by @${{ github.event.issue.user.login }} [skip ci]"
          git push