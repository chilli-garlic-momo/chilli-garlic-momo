#!/usr/bin/env python3
"""
update_maze.py — Cat Heist game engine
Triggered by GitHub Actions on every new issue.

Workflow
--------
1. Read issue title to extract direction (UP / DOWN / LEFT / RIGHT)
2. Load game_state.json
3. Check rate limit for the issuer (15-min cooldown per account)
4. Attempt the move — validate against walls
5. Check win condition
6. Update game_state.json
7. Regenerate README.md
8. Post a comment on the issue via GitHub API
9. Close the issue

Environment variables (set by GitHub Actions)
----------------------------------------------
  ISSUE_NUMBER   : int
  ISSUE_AUTHOR   : str  (GitHub username of person who opened the issue)
  ISSUE_TITLE    : str  (raw issue title)
  GITHUB_TOKEN   : str  (automatically available in Actions)
  GITHUB_REPOSITORY : str  e.g. "chilli-garlic-momo/chilli-garlic-momo"

Usage (Actions)
---------------
  python3 scripts/update_maze.py

Usage (local testing)
---------------------
  ISSUE_NUMBER=1 ISSUE_AUTHOR=testuser ISSUE_TITLE="Move: UP" \\
  GITHUB_TOKEN=ghp_xxx GITHUB_REPOSITORY=chilli-garlic-momo/chilli-garlic-momo \\
  python3 scripts/update_maze.py
"""

import json
import os
import sys
import random
import urllib.request
import urllib.error
from datetime import datetime, timezone, timedelta
from pathlib import Path

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

REPO_ROOT       = Path(__file__).parent.parent
STATE_FILE      = REPO_ROOT / "game_state.json"
README_FILE     = REPO_ROOT / "README.md"
TRACKS_FILE     = REPO_ROOT / "tracks" / "manifest.json"
ASSETS_BASE     = "assets"   # relative path used in README img tags

# ---------------------------------------------------------------------------
# Constants
# ---------------------------------------------------------------------------

COOLDOWN_MINUTES = 15
MAZE_SIZE        = 11
WALL             = 1
PATH             = 0

# Cat colour assigned to each maze by number (cycles every 6)
CAT_CYCLE = ["white", "orange", "black", "siamese", "tuxedo", "brown"]

# Cat names pool — sampled without replacement, resets when exhausted
CAT_NAMES = [
    "Mochi", "Soot", "Nori", "Boba", "Chai", "Miso",
    "Tofu", "Pepper", "Gizmo", "Binx", "Pebble", "Fig",
    "Wren", "Cleo", "Salem", "Jinx", "Pixel", "Remy",
    "Mango", "Rue", "Mittens", "Dumpling", "Pretzel", "Latte",
    "Sesame", "Waffle", "Biscuit", "Pudding", "Noodle", "Maple",
]

DIRECTION_MAP = {
    "UP":    (-1,  0),
    "DOWN":  ( 1,  0),
    "LEFT":  ( 0, -1),
    "RIGHT": ( 0,  1),
}

# Issue title prefixes we recognise
MOVE_PREFIX  = "Move:"
RESET_PREFIX = "[RESET]"

# ---------------------------------------------------------------------------
# Maze generation (inline so this script is self-contained)
# ---------------------------------------------------------------------------

def generate_maze(seed=None):
    """Recursive backtracking maze generator. Returns (grid, player_pos, exit_pos)."""
    rng  = random.Random(seed)
    size = MAZE_SIZE
    grid = [[WALL] * size for _ in range(size)]

    def carve(sr, sc):
        stack = [(sr, sc)]
        grid[sr][sc] = PATH
        while stack:
            r, c = stack[-1]
            neighbours = []
            for dr, dc in [(-2,0),(2,0),(0,-2),(0,2)]:
                nr, nc = r+dr, c+dc
                if 1 <= nr < size-1 and 1 <= nc < size-1 and grid[nr][nc] == WALL:
                    neighbours.append((nr, nc, dr, dc))
            if neighbours:
                nr, nc, dr, dc = rng.choice(neighbours)
                grid[r+dr//2][c+dc//2] = PATH
                grid[nr][nc]           = PATH
                stack.append((nr, nc))
            else:
                stack.pop()

    carve(1, 1)

    # Seal border
    for i in range(size):
        grid[0][i] = grid[size-1][i] = WALL
        grid[i][0] = grid[i][size-1] = WALL

    player_pos = [1, 1]
    exit_pos   = [size-2, size-2]
    grid[1][1] = grid[size-2][size-2] = PATH
    return grid, player_pos, exit_pos


# ---------------------------------------------------------------------------
# GitHub API helpers
# ---------------------------------------------------------------------------

def gh_api(method: str, path: str, body: dict | None = None) -> dict:
    """Make a GitHub REST API call. Returns parsed JSON response."""
    token = os.environ.get("GITHUB_TOKEN", "")
    url   = f"https://api.github.com{path}"
    data  = json.dumps(body).encode() if body else None
    req   = urllib.request.Request(
        url, data=data, method=method,
        headers={
            "Authorization": f"Bearer {token}",
            "Accept":        "application/vnd.github+json",
            "Content-Type":  "application/json",
            "X-GitHub-Api-Version": "2022-11-28",
        }
    )
    try:
        with urllib.request.urlopen(req) as resp:
            return json.loads(resp.read().decode())
    except urllib.error.HTTPError as e:
        body_text = e.read().decode()
        print(f"GitHub API error {e.code}: {body_text}", file=sys.stderr)
        return {}


def post_comment(issue_number: int, body: str):
    repo = os.environ.get("GITHUB_REPOSITORY", "")
    gh_api("POST", f"/repos/{repo}/issues/{issue_number}/comments", {"body": body})


def close_issue(issue_number: int):
    repo = os.environ.get("GITHUB_REPOSITORY", "")
    gh_api("PATCH", f"/repos/{repo}/issues/{issue_number}",
           {"state": "closed", "state_reason": "completed"})


# ---------------------------------------------------------------------------
# State helpers
# ---------------------------------------------------------------------------

def load_state() -> dict:
    with open(STATE_FILE) as f:
        return json.load(f)


def save_state(state: dict):
    with open(STATE_FILE, "w") as f:
        json.dump(state, f, indent=2)


def now_iso() -> str:
    return datetime.now(timezone.utc).isoformat()


def is_on_cooldown(state: dict, author: str) -> tuple[bool, int]:
    """Returns (on_cooldown, minutes_remaining)."""
    last = state.get("last_movers", {}).get(author)
    if not last:
        return False, 0
    last_dt  = datetime.fromisoformat(last)
    elapsed  = datetime.now(timezone.utc) - last_dt
    cooldown = timedelta(minutes=COOLDOWN_MINUTES)
    if elapsed < cooldown:
        remaining = int((cooldown - elapsed).total_seconds() // 60) + 1
        return True, remaining
    return False, 0


def load_tracks() -> list[dict]:
    """Load track manifest. Returns [] if not found."""
    if not TRACKS_FILE.exists():
        return []
    with open(TRACKS_FILE) as f:
        return json.load(f)


def pick_cat_name(maze_number: int, used_names: list[str]) -> str:
    """Pick the next unused cat name, cycling the pool when exhausted."""
    pool = [n for n in CAT_NAMES if n not in used_names]
    if not pool:
        pool = CAT_NAMES[:]   # reset when all names used
    # Deterministic pick based on maze number so it's reproducible
    return pool[(maze_number - 1) % len(pool)]


def init_new_maze(state: dict) -> dict:
    """Generate a new maze and update state in place. Returns updated state."""
    maze_number = state.get("maze_number", 0) + 1
    seed        = random.randint(0, 2**31)

    grid, player_pos, exit_pos = generate_maze(seed=seed)

    used_names   = [entry["maze"] for entry in state.get("hall_of_fame", [])]
    maze_name    = pick_cat_name(maze_number, used_names)
    cat_colour   = CAT_CYCLE[(maze_number - 1) % len(CAT_CYCLE)]

    state.update({
        "maze_number": maze_number,
        "maze_name":   maze_name,
        "cat_colour":  cat_colour,
        "seed":        seed,
        "grid":        grid,
        "player_pos":  player_pos,
        "exit_pos":    exit_pos,
        "move_count":  0,
        "last_movers": {},
        "completed_by": None,
        "track_name":   "To Be Revealed",
        "track_artist": "To Be Revealed",
        "track_file":   track.get("file", ""),
        "_track_reveal_name":   track.get("name",   "???"),
        "_track_reveal_artist": track.get("artist", "???"),
    })
    return state


