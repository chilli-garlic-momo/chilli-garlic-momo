# ---------------------------------------------------------------------------
# Issue parsing
# ---------------------------------------------------------------------------

def parse_direction(title: str) -> str | None:
    """
    Extract direction from issue title.
    Accepts: "Move: UP", "move: up", "Move:UP", "UP", "up"
    Returns normalised uppercase direction or None.
    """
    title = title.strip()
    if ":" in title:
        parts = title.split(":", 1)
        direction = parts[1].strip().upper()
    else:
        direction = title.strip().upper()

    if direction in DIRECTION_MAP:
        return direction
    return None


# ---------------------------------------------------------------------------
# Core move logic
# ---------------------------------------------------------------------------

def attempt_move(state: dict, direction: str) -> tuple[bool, str]:
    """
    Try to move the player in the given direction.

    Returns
    -------
    (moved, reason)
      moved  : True if position changed
      reason : "ok" | "wall" | "win"
    """
    grid       = state["grid"]
    pr, pc     = state["player_pos"]
    dr, dc     = DIRECTION_MAP[direction]
    nr, nc     = pr + dr, pc + dc

    # Out of bounds (shouldn't happen if border is sealed, but be safe)
    if not (0 <= nr < MAZE_SIZE and 0 <= nc < MAZE_SIZE):
        return False, "wall"

    if grid[nr][nc] == WALL:
        return False, "wall"

    # Valid move
    state["player_pos"] = [nr, nc]
    state["move_count"] += 1

    er, ec = state["exit_pos"]
    if nr == er and nc == ec:
        return True, "win"

    return True, "ok"


# ---------------------------------------------------------------------------
# Win handler
# ---------------------------------------------------------------------------

def handle_win(state: dict, author: str):
    """Update state for a completed maze, add hall of fame entry."""
    # Reveal the track
    track_name   = state.pop("_track_reveal_name",   state.get("track_name",   "???"))
    track_artist = state.pop("_track_reveal_artist", state.get("track_artist", "???"))
    track_file   = state.get("track_file", "")

    state["track_name"]   = track_name
    state["track_artist"] = track_artist
    state["completed_by"] = author

    # Log to hall of fame
    state.setdefault("hall_of_fame", []).append({
        "maze":        state["maze_name"],
        "maze_number": state["maze_number"],
        "winner":      author,
        "moves":       state["move_count"],
        "track_name":  track_name,
        "track_artist":track_artist,
        "track_file":  track_file,
    })


# ---------------------------------------------------------------------------
# Comment templates
# ---------------------------------------------------------------------------

def comment_blocked(direction: str, author: str) -> str:
    return (
        f"🐾 **thud.**\n\n"
        f"@{author} tried to go `{direction}` but that's a wall, bestie.\n\n"
        f"_the cat stares at the stones judgementally. try a different direction._"
    )


def comment_moved(direction: str, author: str, move_count: int) -> str:
    arrow = {"UP": "⬆️", "DOWN": "⬇️", "LEFT": "⬅️", "RIGHT": "➡️"}[direction]
    return (
        f"{arrow} **@{author}** moved `{direction}` — move #{move_count}\n\n"
        f"_the board has been updated. check the README!_"
    )


def comment_win(author: str, maze_name: str, move_count: int,
                track_name: str, track_artist: str, track_file: str) -> str:
    song = f"[{track_name} — {track_artist}]({track_file})" \
           if track_file else f"{track_name} — {track_artist}"
    return (
        f"🎉 **@{author} completed the maze!**\n\n"
        f"**{maze_name}** has been adopted after {move_count} moves.\n\n"
        f"🎵 the loot: {song}\n\n"
        f"_a new maze has been generated. the heist continues._"
    )


def comment_cooldown(author: str, minutes_remaining: int) -> str:
    return (
        f"🐱 **patience, little thief.**\n\n"
        f"@{author}, you already moved recently. "
        f"you can move again in **{minutes_remaining} minute{'s' if minutes_remaining != 1 else ''}**.\n\n"
        f"_the cat taps its paw and waits._"
    )


def comment_invalid(author: str, title: str) -> str:
    return (
        f"🤔 @{author}, `{title}` isn't a recognised move.\n\n"
        f"Use one of: `Move: UP` · `Move: DOWN` · `Move: LEFT` · `Move: RIGHT`"
    )


# ---------------------------------------------------------------------------
# Reset handler
# ---------------------------------------------------------------------------

def handle_reset(issue_number: int, author: str):
    """
    [RESET] — full wipe. State, hall of fame, move history — everything gone.
    FOR TESTING ONLY. Delete .github/workflows/reset.yml when done testing.
    Only REPO_OWNER is allowed to trigger this.
    """
    repo  = os.environ.get("GITHUB_REPOSITORY", "")
    owner = repo.split("/")[0] if "/" in repo else ""

    if author.lower() != owner.lower():
        post_comment(issue_number,
            f"🐱 @{author} nice try. only the repo owner can reset.\n\n"
            f"_the cat ignores you._"
        )
        close_issue(issue_number)
        print(f"Reset blocked — @{author} is not the owner (@{owner})")
        return

    print(f"RESET triggered by @{author} — wiping everything")

    # Completely fresh state — no trace of previous games
    fresh = {
        "maze_number":  0,
        "maze_name":    "",
        "cat_colour":   "white",
        "seed":         None,
        "grid":         [],
        "player_pos":   [1, 1],
        "exit_pos":     [MAZE_SIZE-2, MAZE_SIZE-2],
        "move_count":   0,
        "last_movers":  {},
        "completed_by": None,
        "track_name":   "To Be Revealed",
        "track_artist": "To Be Revealed",
        "track_file":   "",
        "hall_of_fame": [],
    }
    fresh = init_new_maze(fresh)
    save_state(fresh)

    readme = build_readme(fresh)
    README_FILE.write_text(readme)

    post_comment(issue_number,
        f"🔄 **full reset complete.**\n\n"
        f"everything wiped. fresh start: **{fresh['maze_name']}** (maze #1)\n\n"
        f"_testing mode. delete the reset workflow when you're done._"
    )
    close_issue(issue_number)
    print("Reset done — full wipe.")


# ---------------------------------------------------------------------------
# Main
# ---------------------------------------------------------------------------

def main():
    issue_number = int(os.environ.get("ISSUE_NUMBER", "0"))
    author       = os.environ.get("ISSUE_AUTHOR",  "unknown")
    title        = os.environ.get("ISSUE_TITLE",   "").strip()

    print(f"Issue #{issue_number} by @{author}: {title!r}")

    # ── Reset ────────────────────────────────────────────────────────────────
    if title.upper().startswith(RESET_PREFIX):
        handle_reset(issue_number, author)
        return

    # ── Parse direction ──────────────────────────────────────────────────────
    direction = parse_direction(title)
    if direction is None:
        post_comment(issue_number, comment_invalid(author, title))
        close_issue(issue_number)
        print(f"Invalid move title: {title!r}")
        return

    # ── Load state ───────────────────────────────────────────────────────────
    state = load_state()

    # Bootstrap: if grid is empty this is first ever run
    if not state.get("grid"):
        print("No grid found — initialising first maze")
        state = init_new_maze(state)
        save_state(state)

    # ── Cooldown check ───────────────────────────────────────────────────────
    on_cd, mins_left = is_on_cooldown(state, author)
    if on_cd:
        post_comment(issue_number, comment_cooldown(author, mins_left))
        close_issue(issue_number)
        print(f"@{author} on cooldown ({mins_left} min remaining)")
        return

    # ── Attempt move ─────────────────────────────────────────────────────────
    moved, reason = attempt_move(state, direction)

    if reason == "wall":
        # Update last_movers even on a blocked move so wall-spamming still hits cooldown
        state.setdefault("last_movers", {})[author] = now_iso()
        save_state(state)
        post_comment(issue_number, comment_blocked(direction, author))
        close_issue(issue_number)
        print(f"Blocked: {direction}")
        return

    # ── Record mover ─────────────────────────────────────────────────────────
    state.setdefault("last_movers", {})[author] = now_iso()

    # ── Win ──────────────────────────────────────────────────────────────────
    if reason == "win":
        handle_win(state, author)
        save_state(state)

        readme = build_readme(state)
        README_FILE.write_text(readme)

        post_comment(issue_number, comment_win(
            author,
            state["maze_name"],
            state["move_count"],
            state["track_name"],
            state["track_artist"],
            state.get("track_file", ""),
        ))
        close_issue(issue_number)
        print(f"WIN by @{author}")

        # Generate next maze immediately
        state = init_new_maze(state)
        save_state(state)
        readme = build_readme(state)
        README_FILE.write_text(readme)
        print(f"New maze ready: {state['maze_name']} (#{state['maze_number']})")
        return

    # ── Normal move ──────────────────────────────────────────────────────────
    save_state(state)
    readme = build_readme(state)
    README_FILE.write_text(readme)

    post_comment(issue_number, comment_moved(direction, author, state["move_count"]))
    close_issue(issue_number)
    print(f"Moved {direction} → {state['player_pos']} (move #{state['move_count']})")


if __name__ == "__main__":
    main()