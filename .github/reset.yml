# Tile asset paths (relative to repo root, used as GitHub raw URLs in README)
TILE = {
    "wall_topleft":     f"{ASSETS_BASE}/tiles/wall_topleft.png",
    "wall_top":         f"{ASSETS_BASE}/tiles/wall_top.png",
    "wall_topright":    f"{ASSETS_BASE}/tiles/wall_topright.png",
    "wall_left":        f"{ASSETS_BASE}/tiles/wall_left.png",
    "wall_right":       f"{ASSETS_BASE}/tiles/wall_right.png",
    "wall_bottomleft":  f"{ASSETS_BASE}/tiles/wall_bottomleft.png",
    "wall_bottomright": f"{ASSETS_BASE}/tiles/wall_bottomright.png",
    "wall_inner":       f"{ASSETS_BASE}/tiles/wall_top.png",
    "floor":            f"{ASSETS_BASE}/tiles/floor.png",
    "floor_tex_a":      f"{ASSETS_BASE}/tiles/floor_textured_a.png",
    "floor_tex_b":      f"{ASSETS_BASE}/tiles/floor_textured_b.png",
    "exit":             f"{ASSETS_BASE}/tiles/exit.png",
    "loot":             f"{ASSETS_BASE}/tiles/loot_hidden.png",
}

CELL_SIZE = 48   # px — rendered size of each tile in the HTML table

# Cells that get a textured floor variant (col, row) — subtle visual interest
TEXTURED_CELLS = {(3, 3), (7, 7), (5, 5)}


def tile_for_cell(grid, r, c, player_pos, exit_pos, cat_colour):
    """Return the <img> tag string for a single grid cell."""
    size = MAZE_SIZE
    pr, pc = player_pos
    er, ec = exit_pos

    # Player
    if r == pr and c == pc:
        src = f"{ASSETS_BASE}/cats/{cat_colour}_run.gif"
        return f'<img src="{src}" width="{CELL_SIZE}" height="{CELL_SIZE}">'

    # Exit
    if r == er and c == ec:
        src = TILE["exit"]
        return f'<img src="{src}" width="{CELL_SIZE}" height="{CELL_SIZE}">'

    # Wall — pick the right directional variant based on border position
    if grid[r][c] == WALL:
        if r == 0 and c == 0:
            src = TILE["wall_topleft"]
        elif r == 0 and c == size - 1:
            src = TILE["wall_topright"]
        elif r == size - 1 and c == 0:
            src = TILE["wall_bottomleft"]
        elif r == size - 1 and c == size - 1:
            src = TILE["wall_bottomright"]
        elif r == 0:
            src = TILE["wall_top"]
        elif r == size - 1:
            src = TILE["wall_top"]      # bottom border reuses top tile (flipped look)
        elif c == 0:
            src = TILE["wall_left"]
        elif c == size - 1:
            src = TILE["wall_right"]
        else:
            src = TILE["wall_inner"]    # interior wall
        return f'<img src="{src}" width="{CELL_SIZE}" height="{CELL_SIZE}">'

    # Path — occasionally textured for visual interest
    if (c, r) in TEXTURED_CELLS:
        # Only texture if the cell is actually a path AND not blocking important spots
        if grid[r][c] == PATH:
            src = TILE["floor_tex_a"] if (c + r) % 2 == 0 else TILE["floor_tex_b"]
            return f'<img src="{src}" width="{CELL_SIZE}" height="{CELL_SIZE}">'

    src = TILE["floor"]
    return f'<img src="{src}" width="{CELL_SIZE}" height="{CELL_SIZE}">'


def build_maze_table(state: dict) -> str:
    """Render the maze grid as an HTML table string."""
    grid       = state["grid"]
    player_pos = state["player_pos"]
    exit_pos   = state["exit_pos"]
    cat_colour = state["cat_colour"]

    rows = []
    rows.append('<table><tbody>')
    for r in range(MAZE_SIZE):
        rows.append('<tr>')
        for c in range(MAZE_SIZE):
            cell_img = tile_for_cell(grid, r, c, player_pos, exit_pos, cat_colour)
            rows.append(f'<td>{cell_img}</td>')
        rows.append('</tr>')
    rows.append('</tbody></table>')
    return "\n".join(rows)


def build_hall_of_fame(hall: list[dict]) -> str:
    if not hall:
        return "_No completed mazes yet. Be the first to adopt a cat!_\n"

    lines = ["| # | Cat | Adopted by | Moves | Song |",
             "|---|-----|-----------|-------|------|"]
    for i, entry in enumerate(reversed(hall), 1):
        song = f"[{entry['track_name']}]({entry['track_file']})" \
               if entry.get("track_file") else entry.get("track_name", "???")
        lines.append(
            f"| {i} | {entry['maze']} | "
            f"[@{entry['winner']}](https://github.com/{entry['winner']}) | "
            f"{entry['moves']} | {song} |"
        )
    return "\n".join(lines) + "\n"


def issue_url(direction: str, repo: str) -> str:
    """Build a pre-filled new-issue URL for a move direction."""
    title = f"Move%3A+{direction}"
    return f"https://github.com/{repo}/issues/new?title={title}"


